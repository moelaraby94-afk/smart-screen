# Stack: PostgreSQL + Redis + MinIO + Nest API + Next Dashboard
#
# Browser API URL: set NEXT_PUBLIC_API_BASE_URL to how clients reach the API
# (e.g. http://YOUR_SERVER_IP:4000/api/v1 when BACKEND_PORT defaults to 4000 → container :3000). Dashboard SSR uses INTERNAL_API_BASE_URL
# to reach the backend inside the Docker network (service name `backend`).
#
# docker compose up --build
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartscreen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartscreen_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-smartscreen}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      # Monorepo root: required for npm workspaces + Prisma paths (do not use apps/backend as context).
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-4000}:3000"
    volumes:
      - media_uploads:/repo/apps/backend/uploads
      # admin-runtime.store.ts (audit log + platform settings) and
      # branding-assets.service.ts (.data/branding/) both write here — without
      # this volume they're wiped on every `docker compose down`/redeploy,
      # same failure mode the media_uploads volume above already guards against.
      - backend_data:/repo/apps/backend/.data
    environment:
      NODE_ENV: production
      PORT: '3000'
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      # Hardcoded to the compose-internal DB service (db:5432), NOT ${DATABASE_URL:-...}.
      # Compose auto-loads the repo-root .env, whose DATABASE_URL points at
      # localhost:5433 (the host port mapping) for host-run Prisma tooling. Left as
      # an override, that host value leaks into this container, where `localhost`
      # is the container itself — so migrate deploy fails with P1001 (can't reach
      # localhost:5433) and the backend crash-loops. Inside the network the db is
      # only reachable as `db:5432`, and that never varies for local dev.
      DATABASE_URL: postgresql://smartscreen:smartscreen_dev_password@db:5432/smartscreen?schema=public
      # No defaults, deliberately. This service runs with NODE_ENV=production, and
      # main.ts refuses to start unless each of these is a strong, unique value
      # (>=32 chars, not a known placeholder, access != refresh). A default here
      # would either be rejected at boot or — worse — be a real secret committed to
      # a public repo. Generate them once into `.env` next to this file:
      #   printf 'JWT_ACCESS_SECRET=%s\nJWT_REFRESH_SECRET=%s\nPLAYER_HEARTBEAT_SECRET=%s\n' \
      #     "$(openssl rand -hex 32)" "$(openssl rand -hex 32)" "$(openssl rand -hex 32)" >> .env
      # The ":?" form makes Compose abort with the given message when the var is unset,
      # so a missing secret fails at `docker compose up`, not at container start.
      # Each value is quoted: an unquoted YAML scalar cannot contain ": ".
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET:?missing in .env - generate with: openssl rand -hex 32}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:?missing in .env - must differ from JWT_ACCESS_SECRET}"
      PLAYER_HEARTBEAT_SECRET: "${PLAYER_HEARTBEAT_SECRET:?missing in .env - generate with: openssl rand -hex 32}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:?missing in .env - generate with: openssl rand -hex 32}"
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      # This service runs with NODE_ENV=production, so main.ts ignores TRUST_DYNAMIC_CORS
      # entirely and REQUIRES ALLOWED_ORIGINS below — the backend refuses to start without it.
      # TRUST_DYNAMIC_CORS only has effect when NODE_ENV != production (local `npm run dev`).
      # Default is the safe one (false) so copying this file into a non-production
      # override (e.g. a staging compose variant) doesn't silently inherit an
      # open CORS policy — opt in explicitly per-environment instead.
      TRUST_DYNAMIC_CORS: ${TRUST_DYNAMIC_CORS:-false}
      # REQUIRED in production: exact comma-separated allow-list of browser origins permitted
      # to call this API with credentials (cookies). The default below only works for this
      # local compose stack (dashboard on localhost:3000) — any real deployment MUST override
      # this with your real domain(s), e.g.:
      #   ALLOWED_ORIGINS=https://app.example.com,https://admin.example.com
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      # How the browser reaches the backend's /media-files/ static route.
      # Without this, buildPublicUrl() falls back to http://localhost:PORT (3000 inside the container),
      # which is the dashboard from the host's perspective — so every media URL 404s.
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-http://localhost:4000}
      # --- Redis ---
      # Optional: when set, enables Redis adapter for WebSocket, shared rate limiting,
      # caching, and queues. Leave unset to use in-memory fallback (single instance only).
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # --- Storage ---
      # "local" (default) uses the volume mount below; "s3" uses S3-compatible storage.
      MEDIA_STORAGE_PROVIDER: ${MEDIA_STORAGE_PROVIDER:-local}
      # When MEDIA_STORAGE_PROVIDER=s3, configure these:
      # S3_BUCKET: ${S3_BUCKET:-smartscreen}
      # S3_REGION: ${S3_REGION:-auto}
      # S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      # S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      # S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      # --- Database pool ---
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      DATABASE_POOL_TIMEOUT_MS: ${DATABASE_POOL_TIMEOUT_MS:-30000}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(\"http\").get(\"http://127.0.0.1:3000/ready\",r=>process.exit(r.statusCode===200?0:1)).on(\"error\",()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api/v1}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: '3000'
      # Browser → API (must be reachable from the user’s machine; use server IP/domain in production)
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api/v1}
      # Dashboard container (SSR) → API over the compose network
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:3000/api/v1}
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS "http://127.0.0.1:3000/api/health" >/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  player:
    build:
      context: .
      dockerfile: Dockerfile.player
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${PLAYER_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: '3001'
      NEXT_PUBLIC_REALTIME_URL: ${NEXT_PUBLIC_REALTIME_URL:-http://localhost:4000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api/v1}
      NEXT_PUBLIC_PLAYER_VERSION: ${NEXT_PUBLIC_PLAYER_VERSION:-0.1.0}
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS "http://127.0.0.1:3001/" >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  control-panel:
    build:
      context: .
      dockerfile: Dockerfile.control-panel
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api/v1}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${CONTROL_PANEL_PORT:-3003}:3002"
    environment:
      NODE_ENV: production
      PORT: '3002'
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api/v1}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:3000/api/v1}
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS "http://127.0.0.1:3002/" >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  marketing:
    build:
      context: .
      dockerfile: Dockerfile.marketing
    restart: unless-stopped
    ports:
      - "${MARKETING_PORT:-3010}:3010"
    environment:
      NODE_ENV: production
      PORT: '3010'
      NEXT_PUBLIC_DASHBOARD_URL: ${NEXT_PUBLIC_DASHBOARD_URL:-http://localhost:3000}
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS "http://127.0.0.1:3010/" >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  pgdata:
  redisdata:
    name: smart_screen_redisdata
  miniodata:
    name: smart_screen_miniodata
  media_uploads:
    name: smart_screen_media_uploads
  backend_data:
    name: smart_screen_backend_data
