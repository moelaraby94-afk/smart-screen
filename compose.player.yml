# Smart Screen — Player only
# Deploy as separate Dokploy application
services:
  player:
    build:
      context: .
      dockerfile: Dockerfile.player
      args:
        NEXT_PUBLIC_API_BASE_URL: https://${API_DOMAIN}/api/v1
        NEXT_PUBLIC_REALTIME_URL: https://${API_DOMAIN}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: '3001'
      NEXT_PUBLIC_REALTIME_URL: https://${API_DOMAIN}
      NEXT_PUBLIC_API_BASE_URL: https://${API_DOMAIN}/api/v1
      NEXT_PUBLIC_PLAYER_VERSION: '0.1.0'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS "http://127.0.0.1:3001/" >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - dokploy-network
networks:
  dokploy-network:
    external: true
