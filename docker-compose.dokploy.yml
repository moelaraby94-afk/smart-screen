# Smart Screen — Dokploy deployment
#
# Database (PostgreSQL) and Redis are created as separate Dokploy resources.
# This compose only contains the application services.
#
# In Dokploy:
#   1. Create PostgreSQL database → get connection string → set DATABASE_URL
#   2. Create Redis database → get connection string → set REDIS_URL
#   3. Create Docker Compose project → this file
#   4. Set all environment variables
#   5. Deploy

services:
  # ── Backend API + WebSocket ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    volumes:
      - media_uploads:/repo/apps/backend/uploads
      - backend_data:/repo/apps/backend/.data
    environment:
      NODE_ENV: production
      PORT: '3000'
      COOKIE_SECURE: 'true'
      DATABASE_URL: "${DATABASE_URL:?Set DATABASE_URL from Dokploy PostgreSQL}"
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET}"
      PLAYER_HEARTBEAT_SECRET: "${PLAYER_HEARTBEAT_SECRET:?Set PLAYER_HEARTBEAT_SECRET}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:?Set ENCRYPTION_KEY}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:?Set ALLOWED_ORIGINS}"
      MEDIA_PUBLIC_BASE_URL: https://${API_DOMAIN}/media-files
      REDIS_URL: "${REDIS_URL:?Set REDIS_URL from Dokploy Redis}"
      MEDIA_STORAGE_PROVIDER: local
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-20}
      DATABASE_POOL_TIMEOUT_MS: ${DATABASE_POOL_TIMEOUT_MS:-30000}
      TRUST_PROXY_HOPS: '1'
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-300}
      HEARTBEAT_STALE_MS: ${HEARTBEAT_STALE_MS:-45000}
      HEARTBEAT_SWEEP_MS: ${HEARTBEAT_SWEEP_MS:-10000}
      PAIRING_SESSION_TTL_MS: ${PAIRING_SESSION_TTL_MS:-900000}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@gpack.tech}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Smart Screen}
      NEXT_PUBLIC_ALLOW_MOCK_BILLING: 'false'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(\"http\").get(\"http://127.0.0.1:3000/ready\",r=>process.exit(r.statusCode===200?0:1)).on(\"error\",()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 90s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=3000"

  # ── Dashboard (customer panel) ─────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
      args:
        NEXT_PUBLIC_API_BASE_URL: https://${API_DOMAIN}/api/v1
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: '3000'
      NEXT_PUBLIC_API_BASE_URL: https://${API_DOMAIN}/api/v1
      INTERNAL_API_BASE_URL: http://backend:3000/api/v1
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS "http://127.0.0.1:3000/api/health" >/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`${DASHBOARD_DOMAIN}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.dashboard.loadbalancer.server.port=3000"

  # ── Player (kiosk screen runtime) ──────────────────────────────────────
  player:
    build:
      context: .
      dockerfile: Dockerfile.player
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: '3001'
      NEXT_PUBLIC_REALTIME_URL: https://${API_DOMAIN}
      NEXT_PUBLIC_API_BASE_URL: https://${API_DOMAIN}/api/v1
      NEXT_PUBLIC_PLAYER_VERSION: ${NEXT_PUBLIC_PLAYER_VERSION:-0.1.0}
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS "http://127.0.0.1:3001/" >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.player.rule=Host(`${PLAYER_DOMAIN}`)"
      - "traefik.http.routers.player.entrypoints=websecure"
      - "traefik.http.routers.player.tls=true"
      - "traefik.http.routers.player.tls.certresolver=letsencrypt"
      - "traefik.http.services.player.loadbalancer.server.port=3001"

  # ── Control Panel (platform admin) ─────────────────────────────────────
  control-panel:
    build:
      context: .
      dockerfile: Dockerfile.control-panel
      args:
        NEXT_PUBLIC_API_BASE_URL: https://${API_DOMAIN}/api/v1
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: '3002'
      NEXT_PUBLIC_API_BASE_URL: https://${API_DOMAIN}/api/v1
      INTERNAL_API_BASE_URL: http://backend:3000/api/v1
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS "http://127.0.0.1:3002/" >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.control-panel.rule=Host(`${ADMIN_DOMAIN}`)"
      - "traefik.http.routers.control-panel.entrypoints=websecure"
      - "traefik.http.routers.control-panel.tls=true"
      - "traefik.http.routers.control-panel.tls.certresolver=letsencrypt"
      - "traefik.http.services.control-panel.loadbalancer.server.port=3002"

  # ── Marketing site ─────────────────────────────────────────────────────
  marketing:
    build:
      context: .
      dockerfile: Dockerfile.marketing
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: '3010'
      NEXT_PUBLIC_DASHBOARD_URL: https://${DASHBOARD_DOMAIN}
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS "http://127.0.0.1:3010/" >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.marketing.rule=Host(`${MARKETING_DOMAIN}`)"
      - "traefik.http.routers.marketing.entrypoints=websecure"
      - "traefik.http.routers.marketing.tls=true"
      - "traefik.http.routers.marketing.tls.certresolver=letsencrypt"
      - "traefik.http.services.marketing.loadbalancer.server.port=3010"

volumes:
  media_uploads:
  backend_data:
