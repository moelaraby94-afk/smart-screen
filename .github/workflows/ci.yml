name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  verify:
    runs-on: ubuntu-latest
    # Prisma CLI reads DATABASE_URL from the environment even for validate/generate (no live DB required).
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma generate (backend)
        working-directory: apps/backend
        run: npx prisma generate --config prisma.config.ts

      - name: Prisma validate
        working-directory: apps/backend
        run: npx prisma validate --config prisma.config.ts

      # typecheck -> lint (--max-warnings=0) -> tests -> i18n -> builds.
      # One script so that `npm run verify` locally runs exactly what CI runs.
      # The previous workflow never linted the backend, never ran the player
      # tests, and never typechecked anything that `next build` did not compile.
      - name: Verify
        run: npm run verify

      - name: Backend test coverage
        working-directory: apps/backend
        run: node --experimental-vm-modules ../../node_modules/jest/bin/jest.js --coverage --forceExit
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public

      - name: Backend E2E tests
        working-directory: apps/backend
        run: node --experimental-vm-modules ../../node_modules/jest/bin/jest.js --config test/jest-e2e.json --forceExit

      # T1.3 — Dependency audit gate. Now blocking — CI fails on high+critical
      # vulnerabilities. Phase 2 security hardening.
      - name: Dependency audit (high+critical)
        run: npm audit --audit-level=high

      - name: Marketing build
        run: npm run build -w apps/marketing

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start dashboard for E2E
        run: |
          npm run start -w apps/dashboard &
          npx wait-on http://localhost:3000/api/health --timeout 60000

      - name: E2E tests
        run: npm run test:e2e -w apps/dashboard
        env:
          E2E_BASE_URL: http://localhost:3000
