name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  verify:
    runs-on: ubuntu-latest
    # Prisma CLI reads DATABASE_URL from the environment even for validate/generate (no live DB required).
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma generate (backend)
        working-directory: apps/backend
        run: npx prisma generate --config prisma.config.ts

      - name: Prisma validate
        working-directory: apps/backend
        run: npx prisma validate --config prisma.config.ts

      # typecheck -> lint (--max-warnings=0) -> tests -> i18n -> builds.
      # One script so that `npm run verify` locally runs exactly what CI runs.
      # The previous workflow never linted the backend, never ran the player
      # tests, and never typechecked anything that `next build` did not compile.
      - name: Verify
        run: npm run verify

      - name: Marketing build
        run: npm run build -w apps/marketing
