# Smart Screen — Marketing site only
# Deploy as separate Dokploy application
services:
  marketing:
    build:
      context: .
      dockerfile: Dockerfile.marketing
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: '3010'
      NEXT_PUBLIC_DASHBOARD_URL: https://${DASHBOARD_DOMAIN}
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS "http://127.0.0.1:3010/" >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - dokploy-network
networks:
  dokploy-network:
    external: true
